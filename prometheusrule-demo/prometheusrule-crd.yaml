# PrometheusRule CRD - required on ALL clusters before federation
# Source: https://github.com/prometheus-operator/prometheus-operator
# Apply to each cluster: kubectl apply -f prometheusrule-crd.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: prometheusrules.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  names:
    kind: PrometheusRule
    listKind: PrometheusRuleList
    plural: prometheusrules
    singular: prometheusrule
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    type: object
                    required: [name, rules]
                    properties:
                      name:
                        type: string
                      rules:
                        type: array
                        items:
                          type: object
                          required: [expr]
                          properties:
                            alert:
                              type: string
                            expr:
                              x-kubernetes-int-or-string: true
                            for:
                              type: string
                            labels:
                              type: object
                            annotations:
                              type: object
