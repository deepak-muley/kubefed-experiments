apiVersion: types.kubefed.io/v1beta1
kind: FederatedDeployment
metadata:
  name: nginx
  namespace: demo-app
spec:
  template:
    metadata:
      labels:
        app: nginx
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
            - name: nginx
              image: nginx:alpine
              volumeMounts:
                - name: web-file
                  mountPath: /usr/share/nginx/html/
          volumes:
            - name: web-file
              configMap:
                name: web-file
  placement:
    clusterSelector: {}
